<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 
    SimpleRadio Station Icon - Station 08: Country & Folk (民谣、乡村与自然)
    Theme: Mountain Peaks & Pine Trees in Sunset (日落群山与挺拔松树)
  -->
  <defs>
    <!-- 渐变色：清新自然松石绿到森林绿 -->
    <linearGradient id="bg_nature" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#113840"/>
      <stop offset="60%" stop-color="#1b5a5c"/>
      <stop offset="100%" stop-color="#4d8b67"/>
    </linearGradient>
  </defs>
  
  <!-- 背景圆盘 -->
  <circle cx="50" cy="50" r="48" fill="url(#bg_nature)" stroke="#a3e2b1" stroke-width="2"/>
  
  <!-- 1. 背景中半透明落日 (Sunset) -->
  <circle cx="50" cy="46" r="16" fill="white" opacity="0.3"/>
  
  <!-- 2. 后排远山 (半透明白色，增加层次) -->
  <polygon points="12,74 40,43 66,74" fill="white" opacity="0.4"/>
  
  <!-- 3. 前排近山 (实心白色) -->
  <polygon points="34,74 62,37 90,74" fill="white"/>
  
  <!-- 4. 左侧几何松树 1 (Cozy Pine Tree) -->
  <g fill="white">
    <!-- 树干 -->
    <rect x="25" y="70" width="1.5" height="5" rx="0.5"/>
    <!-- 树冠 (多重三角折线) -->
    <polygon points="21,70 30,70 25.7,64"/>
    <polygon points="22,64 29,64 25.7,59"/>
    <polygon points="23,59 28,59 25.7,55"/>
  </g>
  
  <!-- 5. 右侧线条化松树 2 (错落排布，几何线条感) -->
  <!-- 使用极简的路径树干和针状枝叶 -->
  <g stroke="#1b5a5c" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- 树干 -->
    <line x1="33" y1="63" x2="33" y2="73"/>
    <!-- 针叶折线 (从上往下) -->
    <path d="M33 55 L30 59 M33 55 L36 59"/>
    <path d="M33 59 L28 64 M33 59 L38 64"/>
    <path d="M33 64 L26 70 M33 64 L40 70"/>
  </g>
  
  <!-- 6. 天空微风云彩 -->
  <path d="M22 34 Q32 30 46 33 T72 32" fill="none" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  <path d="M18 38 Q26 36 38 38" fill="none" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.15"/>
</svg>
