<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 
    SimpleRadio Station Icon - Station 06: Lofi Chill and Ambient (治愈Lofi与深夜放松)
    Theme: Cassette Tape and Cozy Crescent Moon (复古磁带与温馨月牙星空)
  -->
  <defs>
    <!-- 渐变色：深夜静谧蓝紫 -->
    <linearGradient id="bg_lofi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>
  
  <!-- 背景圆盘 -->
  <circle cx="50" cy="50" r="48" fill="url(#bg_lofi)" stroke="#89a2fa" stroke-width="2"/>
  
  <!-- 弯弯的月亮与繁星 (深夜温暖意境) -->
  <g fill="white">
    <!-- 优雅月牙 -->
    <path d="M66 18 A11 11 0 1 0 78 29 A9 9 0 1 1 66 18 Z" opacity="0.9"/>
    
    <!-- 闪烁的十字星 1 -->
    <path d="M38 25 L40 22 L38 19 L36 22 Z" opacity="0.8"/>
    
    <!-- 闪烁的十字星 2 (小) -->
    <path d="M50 16 L51.2 14.5 L50 13 L48.8 14.5 Z" opacity="0.5"/>
    
    <!-- 小星点 -->
    <circle cx="30" cy="18" r="0.8" opacity="0.6"/>
    <circle cx="58" cy="24" r="0.6" opacity="0.7"/>
  </g>
  
  <!-- 复古卡带主体 -->
  <g fill="white">
    <!-- 外壳 -->
    <rect x="24" y="40" width="52" height="34" rx="4" fill="white"/>
    
    <!-- 卡带内部深色标签 -->
    <rect x="29" y="45" width="42" height="19" rx="2" fill="#1b2836"/>
    
    <!-- 卡带卷带孔 (左) -->
    <circle cx="39" cy="54" r="5" fill="white"/>
    <circle cx="39" cy="54" r="2" fill="#1b2836"/>
    <!-- 卷带齿轮细微点缀 -->
    <line x1="39" y1="49" x2="39" y2="59" stroke="#1b2836" stroke-width="1"/>
    <line x1="34" y1="54" x2="44" y2="54" stroke="#1b2836" stroke-width="1"/>
    
    <!-- 卡带卷带孔 (右) -->
    <circle cx="61" cy="54" r="5" fill="white"/>
    <circle cx="61" cy="54" r="2" fill="#1b2836"/>
    <line x1="61" y1="49" x2="61" y2="59" stroke="#1b2836" stroke-width="1"/>
    <line x1="56" y1="54" x2="66" y2="54" stroke="#1b2836" stroke-width="1"/>
    
    <!-- 磁带孔之间的横线 -->
    <rect x="47" y="53.5" width="6" height="1" rx="0.5" fill="white" opacity="0.6"/>
    
    <!-- 底部梯形压带结构 -->
    <polygon points="34,74 66,74 61,68 39,68" fill="white"/>
    
    <!-- 压带处的两个小圆孔 -->
    <circle cx="44" cy="71" r="1" fill="#1b2836"/>
    <circle cx="56" cy="71" r="1" fill="#1b2836"/>
  </g>
</svg>
