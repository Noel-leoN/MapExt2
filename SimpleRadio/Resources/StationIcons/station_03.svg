<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 
    SimpleRadio Station Icon - Station 03: Rock & Heavy Metal (摇滚与重金属)
    Theme: Flying V Guitar & Lightning (V型电吉他与暴烈闪电)
  -->
  <defs>
    <linearGradient id="bg_rock" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140202"/>
      <stop offset="50%" stop-color="#540404"/>
      <stop offset="100%" stop-color="#cc0606"/>
    </linearGradient>
  </defs>
  
  <!-- 背景圆盘 -->
  <circle cx="50" cy="50" r="48" fill="url(#bg_rock)" stroke="#ff4c4c" stroke-width="2"/>
  
  <!-- 背景撕裂闪电 (半透明装饰，增强硬核感) -->
  <polygon points="56,12 36,46 48,46 38,88 64,46 50,46" fill="white" opacity="0.25"/>
  
  <!-- 电吉他组 (斜向 45 度放置) -->
  <g fill="white" transform="rotate(45 50 50)">
    <!-- 摇滚标志性 Flying V 琴身 -->
    <path d="M50 52 L32 80 L42 82 L50 68 L58 82 L68 80 Z" fill="white"/>
    
    <!-- 琴身内阴影细节 -->
    <path d="M50 56 L36 78 L41 79 L50 69 L59 79 L64 78 Z" fill="#540404" opacity="0.3"/>
    
    <!-- 琴头弦钮 -->
    <circle cx="43" cy="14" r="1"/>
    <circle cx="43" cy="18" r="1"/>
    <circle cx="43" cy="22" r="1"/>
    <circle cx="57" cy="14" r="1"/>
    <circle cx="57" cy="18" r="1"/>
    <circle cx="57" cy="22" r="1"/>
    
    <!-- 尖角摇滚琴头 -->
    <path d="M50 26 L45 24 L45 10 L50 14 L55 10 L55 24 Z" fill="white"/>
    
    <!-- 琴颈 -->
    <rect x="48" y="26" width="4" height="28" rx="0.5" fill="white"/>
    
    <!-- 指板中线 (琴弦感觉) -->
    <line x1="50" y1="26" x2="50" y2="54" stroke="#540404" stroke-width="0.8" opacity="0.5"/>
    
    <!-- 吉他拾音器与音量旋钮 -->
    <rect x="47" y="56" width="6" height="3" rx="0.5" fill="#540404" opacity="0.8"/>
    <circle cx="46" cy="62" r="1.5" fill="#540404" opacity="0.8"/>
    <circle cx="54" cy="62" r="1.5" fill="#540404" opacity="0.8"/>
  </g>
</svg>
